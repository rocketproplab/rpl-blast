# BLAST Web and Data Configuration

# Data Source
data_source: "serial"  # "serial" or "simulator"

# Serial Configuration
serial_port: "/dev/cu.usbmodem11301"
serial_baudrate: 115200

# subpage 1
subpage1:
  title: "Pressure Transducers"
  description: "Pressure measurements from pressure transducers"
  pressure_transducers:
    - name: "GN2"
      id: "pt1"
      color: "#0072B2"  # Blue
      min_value: -50
      max_value: 500
      warning_value: 250
      danger_value: 400
    - name: "LOX"
      id: "pt2"
      color: "#E69F00"  # Orange
      min_value: -50
      max_value: 500
      warning_value: 250
      danger_value: 400
    - name: "LNG"
      id: "pt3"
      color: "#56B4E9"  # Light Blue
      min_value: -50
      max_value: 500
      warning_value: 250
      danger_value: 400
    - name: "LNG Downstream"
      id: "pt4"
      color: "#009E73"  # Teal
      min_value: -50
      max_value: 500
      warning_value: 250
      danger_value: 400
    - name: "LOX Downstream"
      id: "pt5"
      color: "#CC79A7"  # Pink
      min_value: -50
      max_value: 500
      warning_value: 250
      danger_value: 400
    - name: "LOG DOME"
      id: "pt6"
      color: "#009E73"  # Green
      min_value: -50
      max_value: 500
      warning_value: 250
      danger_value: 400
    - name: "LNG DOME"
      id: "pt7"
      color: "#D55E00"  # Purple
      min_value: -50
      max_value: 500
      warning_value: 250
      danger_value: 400

