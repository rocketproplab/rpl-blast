<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/calibration.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <div class="header-content">
            <h1 class="site-title">
                <span class="blast-text">BLAST</span> | <span class="page-name">{% block header_title %}Big Launch Analysis & Stats Terminal{% endblock %}</span>
            </h1>
            {% if request.endpoint != 'main.index' %}
            <nav class="page-nav">
                <a href="/" class="nav-link">← Back to Dashboard</a>
            </nav>
            {% endif %}
        </div>
    </header>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <!-- WebSocket and core functionality -->
    <script src="/static/js/websocket-manager.js"></script>
    <script src="/static/js/calibration-manager.js"></script>
    <script src="/static/js/browser-monitor.js"></script>
</body>
</html>
